<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // SPA 路由重定向脚本
    // 将 404 请求重定向到 index.html，保留原始路径
    (function() {
      var segment = 0; // 如果部署在子目录，改为子目录的层级数
      var location = window.location;
      var pathname = location.pathname;
      
      // 保存原始路径到 sessionStorage
      sessionStorage.setItem('redirectPath', pathname + location.search + location.hash);
      
      // 重定向到首页
      location.replace(location.origin + '/');
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
