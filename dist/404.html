<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA 重定向处理
    // 将当前路径保存到 sessionStorage，然后重定向到首页
    (function() {
      var location = window.location;
      var pathname = location.pathname;
      var search = location.search;
      var hash = location.hash;
      
      // 保存完整路径（包括查询参数和哈希）
      var fullPath = pathname + search + hash;
      
      // 存储到 sessionStorage
      sessionStorage.setItem('spa_redirect_path', fullPath);
      
      // 重定向到首页
      location.replace(location.origin + '/');
    })();
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
