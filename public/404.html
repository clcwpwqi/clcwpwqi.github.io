<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // 获取当前访问的完整路径（例如 /posts/hello）
        var originalPath = window.location.pathname;

        // 将路径作为参数传给首页，保留查询参数和哈希
        var redirectUrl = '/' + (originalPath === '/' ? '' : '?redirect=' + encodeURIComponent(originalPath)) + window.location.search + window.location.hash;

        // 执行重定向
        window.location.replace(redirectUrl);
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
