name: Deploy to GitHub Pages

on:
  # 在推送到 main 分支时触发
  push:
    branches: ['main']
    paths:
      - 'posts/**'      # 文章目录变化
      - 'src/**'        # 源代码变化
      - 'public/**'     # 静态资源变化
      - 'index.html'    # HTML 模板变化
      - 'package.json'  # 依赖变化
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'tsconfig.json'
  
  # 允许手动触发
  workflow_dispatch:

# 设置 GITHUB_TOKEN 权限
permissions:
  contents: read
  pages: write
  id-token: write

# 并发控制
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
      
      # 检查 posts 目录是否有变化
      - name: Check posts changes
        id: posts-check
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "^posts/"; then
            echo "Posts directory changed"
            echo "posts_changed=true" >> $GITHUB_OUTPUT
          else
            echo "No posts changes"
            echo "posts_changed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
        
      - name: Build posts data
        run: npm run build:posts
        
      - name: Build project
        run: npm run build
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
